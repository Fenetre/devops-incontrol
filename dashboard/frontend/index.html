<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>DevOps InControl Dashboard</title>
    <style>
      body { margin: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      /* Sidebar submenu transition */
      .submenu-enter-active, .submenu-leave-active { transition: max-height 0.2s ease, opacity 0.2s ease; overflow: hidden; }
      .submenu-enter-from, .submenu-leave-to { max-height: 0; opacity: 0; }
      .submenu-enter-to, .submenu-leave-from { max-height: 500px; opacity: 1; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
