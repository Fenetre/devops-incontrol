<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>DevOps InControl Dashboard</title>
    <style>
      body { margin: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      /* Sidebar submenu transition */
      .submenu-enter-active, .submenu-leave-active { transition: max-height 0.2s ease, opacity 0.2s ease; overflow: hidden; }
      .submenu-enter-from, .submenu-leave-to { max-height: 0; opacity: 0; }
      .submenu-enter-to, .submenu-leave-from { max-height: 500px; opacity: 1; }

      /* Navy dark-mode overrides — shift neutral grays to #262660 family */
      .dark .dark\:bg-gray-900      { background-color: #0e0e24 !important; }
      .dark .dark\:bg-gray-800      { background-color: #1c1c4d !important; }
      .dark .dark\:bg-gray-800\/50  { background-color: rgb(28 28 77 / 0.5) !important; }
      .dark .dark\:bg-gray-700      { background-color: #2e2e6e !important; }
      .dark .dark\:bg-gray-700\/50  { background-color: rgb(46 46 110 / 0.5) !important; }
      .dark .dark\:bg-gray-700\/40  { background-color: rgb(46 46 110 / 0.4) !important; }
      .dark .dark\:bg-gray-700\/30  { background-color: rgb(46 46 110 / 0.3) !important; }
      .dark .dark\:border-gray-700  { border-color: #3c3c8a !important; }
      .dark .dark\:border-gray-600  { border-color: #5050a0 !important; }
      .dark .dark\:hover\:bg-gray-700:hover  { background-color: #2e2e6e !important; }
      .dark .dark\:hover\:bg-gray-600:hover  { background-color: #3c3c8a !important; }
      .dark .dark\:hover\:bg-gray-700\/50:hover { background-color: rgb(46 46 110 / 0.5) !important; }
      .dark .dark\:hover\:bg-gray-700\/40:hover { background-color: rgb(46 46 110 / 0.4) !important; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
